<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Navigation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b1b33;
      overflow: hidden;
      font-family: "Noto Sans", "Segoe UI", Arial, sans-serif;
    }

    #frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b1b33;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(116, 154, 199, 0.7);
      background: rgba(18, 40, 69, 0.8);
      color: #d8e6f9;
      font-size: 13px;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">Loading map iframe...</div>
  <iframe id="frame" allowfullscreen loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>

  <script>
    (function () {
      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function parseHash() {
        var raw = location.hash ? location.hash.slice(1) : "";
        var out = {};
        if (!raw) return out;
        raw.split("&").forEach(function (pair) {
          var i = pair.indexOf("=");
          if (i < 0) return;
          out[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(pair.slice(i + 1));
        });
        return out;
      }

      var statusEl = document.getElementById("status");
      var frame = document.getElementById("frame");
      var p = parseHash();
      // Force location to Wolfsburg, DE regardless of incoming hash params.
      var fallbackLat = 52.4227;
      var fallbackLon = 10.7865;
      var forcedQuery = "Wolfsburg, Germany";
      var z = clamp(parseInt(p.z || "13", 10) || 13, 3, 18);

      function mapSrc(lat, lon) {
        var safeLat = clamp(parseFloat(lat) || fallbackLat, -85.0, 85.0);
        var safeLon = clamp(parseFloat(lon) || fallbackLon, -180.0, 180.0);
        return "https://www.google.com/maps?hl=en" +
          "&q=" + encodeURIComponent(forcedQuery) +
          "&ll=" + safeLat.toFixed(6) + "," + safeLon.toFixed(6) +
          "&z=" + z +
          "&t=m&output=embed&v=" + Date.now();
      }

      function applyLocation(lat, lon, msg) {
        statusEl.style.display = "block";
        frame.src = mapSrc(fallbackLat, fallbackLon);
        statusEl.textContent = msg;
      }

      function fetchJsonWithTimeout(url, timeoutMs) {
        if (typeof AbortController === "function") {
          var controller = new AbortController();
          var timer = setTimeout(function () { controller.abort(); }, timeoutMs);
          return fetch(url, { cache: "no-store", signal: controller.signal })
            .finally(function () { clearTimeout(timer); });
        }
        return fetch(url, { cache: "no-store" });
      }

      function ipLocateFrom(url, parser) {
        return fetchJsonWithTimeout(url, 3500).then(function (res) {
          if (!res.ok) throw new Error("ip locate http " + res.status);
          return res.json();
        }).then(function (data) {
          var out = parser(data);
          if (!out || !isFinite(out.lat) || !isFinite(out.lon))
            throw new Error("ip locate parse fail");
          return out;
        });
      }

      function ipLocate() {
        return ipLocateFrom("https://ipapi.co/json/", function (data) {
          return {
            lat: Number(data.latitude),
            lon: Number(data.longitude)
          };
        }).catch(function () {
          return ipLocateFrom("https://ipwho.is/", function (data) {
            if (!data || data.success === false) return null;
            return {
              lat: Number(data.latitude),
              lon: Number(data.longitude)
            };
          });
        });
      }

      function locateAndOpen() {
        // Intentionally fixed location for demo/stable operation.
        // Geolocation/IP lookup is skipped by design.
        applyLocation(fallbackLat, fallbackLon, "Fixed location: Wolfsburg");
      }

      frame.onload = function () {
        statusEl.style.display = "none";
      };
      frame.onerror = function () {
        statusEl.style.display = "block";
        statusEl.textContent = "Map iframe failed to load";
      };

      setTimeout(function () {
        if (statusEl.style.display !== "none") {
          statusEl.textContent = "Map loading... (check internet)";
        }
      }, 7000);

      locateAndOpen();
    })();
  </script>
</body>
</html>

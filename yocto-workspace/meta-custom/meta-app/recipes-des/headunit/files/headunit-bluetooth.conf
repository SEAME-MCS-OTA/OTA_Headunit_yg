<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow send_destination="org.bluez"/>
    <allow receive_sender="org.bluez"/>
  </policy>
  <policy user="headunit">
    <allow send_destination="org.bluez"/>
    <allow receive_sender="org.bluez"/>
    <allow send_destination="org.bluez" send_type="method_return"/>
  </policy>
  <policy user="pulse">
    <allow send_destination="org.bluez"/>
    <allow receive_sender="org.bluez"/>
    <!-- PulseAudio Bluetooth modules disabled - using bluealsa instead -->
  </policy>
  <policy user="bluealsa">
    <allow send_destination="org.bluez"/>
    <allow receive_sender="org.bluez"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.ProfileManager1"
           send_member="RegisterProfile"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.ProfileManager1"
           send_member="UnregisterProfile"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Media1"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaEndpoint1"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.ObjectManager"
           send_member="GetManagedObjects"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Get"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="GetAll"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.bluez"
           send_interface="org.bluez.AgentManager1"
           send_member="RegisterAgent"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.AgentManager1"
           send_member="RequestDefaultAgent"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.AgentManager1"
           send_member="UnregisterAgent"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaControl1"
           send_member="Set"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Device1"
           send_member="Connect"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Device1"
           send_member="Disconnect"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Device1"
           send_member="Pair"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Device1"
           send_member="CancelPairing"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaPlayer1"
           send_member="Play"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaPlayer1"
           send_member="Pause"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaPlayer1"
           send_member="Stop"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaPlayer1"
           send_member="Next"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.MediaPlayer1"
           send_member="Previous"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Set"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Get"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="GetAll"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.ObjectManager"
           send_member="GetManagedObjects"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Adapter1"
           send_member="SetProperty"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Adapter1"
           send_member="StartDiscovery"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Adapter1"
           send_member="StopDiscovery"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.Adapter1"
           send_member="RemoveDevice"/>
  </policy>
</busconfig>

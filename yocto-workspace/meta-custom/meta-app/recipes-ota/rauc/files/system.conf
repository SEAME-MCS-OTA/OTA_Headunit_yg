[system]
compatible=des-hu-rpi4
bootloader=custom
statusfile=/data/rauc.status

[keyring]
path=/etc/rauc/ca.cert.pem

[handlers]
bootloader-custom-backend=/usr/sbin/rauc-bootloader-backend.sh

[slot.rootfs.0]
device=/dev/mmcblk0p2
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=ext4
bootname=B

[slot.boot.0]
device=/dev/mmcblk0p1
type=vfat
parent=rootfs.0

[slot.boot.1]
device=/dev/mmcblk0p1
type=vfat
parent=rootfs.1

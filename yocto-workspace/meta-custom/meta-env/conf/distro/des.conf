DISTRO = "des"
DISTRO_NAME = "DES Head-Unit"
DISTRO_VERSION = "1.0"
VIRTUAL-RUNTIME_init_manager = "systemd"
DISTRO_FEATURES:append = " systemd wayland opengl pulseaudio bluetooth pam usrmerge rauc"
QT_QPA_PLATFORM ?= "wayland"
PACKAGE_CLASSES ?= "package_rpm"
SYSTEMD_DEFAULT_TARGET = "graphical.target"
PACKAGECONFIG:append:pn-systemd = " timesyncd"
ROOT_HOME = "/root"
LICENSE_FLAGS_ACCEPTED:append = " synaptics-killswitch"
INHERIT += "report-error"

# OTA A/B boot switching uses Raspberry Pi firmware direct-boot + /boot/cmdline.txt
# (yg repository strategy). Keep U-Boot disabled to avoid slot-source conflicts
# with RAUC custom backend scripts that update cmdline.txt root=.
RPI_USE_U_BOOT:raspberrypi4-64 = "0"

[General]
Name = SEAME2025
# Class 0x6c0414: Audio Sink + Source (Full Audio Device)
# 0x6c = Audio + Rendering + Capturing + Telephony Service
# 0x04 = Audio/Video Device
# 0x14 = Loudspeaker (makes device appear as audio output)
Class = 0x6c0414
DiscoverableTimeout = 0
PairableTimeout = 0
# Disable=Source is not supported in BlueZ 5 - removed
# Enable experimental features for A2DP Sink support
Experimental = true

[Policy]
AutoEnable=true

[GATT]
Cache = yes
KeySize = 16

[AVDTP]
SessionMode = basic

[LE]
MinConnectionInterval = 8
MaxConnectionInterval = 12

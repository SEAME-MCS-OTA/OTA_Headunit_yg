# DES Cockpit Weston Configuration
# Dual HDMI display setup for Head-Unit and Instrument Cluster

[core]
# Enable input devices for touch support
require-input=true
idle-time=0
backend=drm-backend.so
shell=kiosk-shell.so
# Enable remote control for debugging (optional)
# modules=screen-share.so

# HDMI-A-1: First HDMI output (Head-Unit)
[output]
name=HDMI-A-1
mode=1024x600@60
transform=normal
scale=1
app-ids=HeadUnitApp
# Disable cursor on this output
cursor-size=0

# HDMI-A-2: Second HDMI output (Instrument Cluster)
[output]
name=HDMI-A-2
mode=1024x600@60
transform=normal
scale=1
app-ids=appIC
# Disable cursor on this output
cursor-size=0

[shell]
panel-position=none
background-color=0xff000000
locking=false

# Kiosk shell configuration
[kiosk-shell]
# No background image needed
